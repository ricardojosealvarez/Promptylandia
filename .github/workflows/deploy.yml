name: Inject and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into index.html
        run: |
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|SUPABASE_ANON_PLACEHOLDER|${{ secrets.SUPABASE_ANON }}|g" index.html
          sed -i "s|SUPABASE_SERVICE_PLACEHOLDER|${{ secrets.SUPABASE_SERVICE }}|g" index.html
          sed -i "s|EDIT_PASSWORD_PLACEHOLDER|${{ secrets.EDIT_PASSWORD }}|g" index.html

      - name: Commit injected file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: inject secrets [skip ci]"
          git push
